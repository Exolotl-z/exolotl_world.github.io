<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="奇思妙想 - 记录灵感与创意">
    <title>奇思妙想 - 我的个人网站</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ideas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <i class="fas fa-code"></i>
                    <span>我的空间</span>
                </a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="blog.html" class="nav-link">博客</a></li>
                <li><a href="ideas.html" class="nav-link active">奇思妙想</a></li>
                <li><a href="about.html" class="nav-link">关于我</a></li>
            </ul>
            <div class="nav-auth" id="navAuth">
                <button class="auth-btn" id="authBtn">
                    <i class="fas fa-user"></i>
                    <span>登录</span>
                </button>
            </div>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <section class="ideas-header">
            <div class="container">
                <h1 class="page-title">
                    <i class="fas fa-lightbulb"></i>
                    奇思妙想
                </h1>
                <p class="page-subtitle">记录每一个灵感瞬间</p>
            </div>
        </section>

        <!-- 操作区域 -->
        <section class="ideas-actions">
            <div class="container">
                <button class="add-idea-btn" id="addIdeaBtn">
                    <i class="fas fa-plus"></i>
                    添加新想法
                </button>
            </div>
        </section>

        <!-- 想法卡片网格 -->
        <section class="ideas-section">
            <div class="container">
                <div class="ideas-grid" id="ideasGrid">
                    <!-- 卡片将由JavaScript动态生成 -->
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fas fa-lightbulb"></i>
                    <p>还没有想法，点击上方按钮添加第一个吧！</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 添加/编辑想法模态框 -->
    <div class="modal" id="ideaModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加新想法</h2>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="ideaTitle">标题</label>
                    <input type="text" id="ideaTitle" class="form-input" placeholder="给你的想法起个名字...">
                </div>
                <div class="form-group">
                    <label for="ideaContent">内容</label>
                    <textarea id="ideaContent" class="form-textarea" rows="6" placeholder="详细描述你的想法..."></textarea>
                </div>
                <div class="form-group">
                    <label for="ideaTags">标签</label>
                    <input type="text" id="ideaTags" class="form-input" placeholder="用逗号分隔多个标签，如：技术,创意,灵感">
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="ideaPinned">
                        <span>置顶到首页</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 想法详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-overlay" id="detailModalOverlay"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="detailTitle">想法标题</h2>
                <button class="modal-close" id="detailModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="detail-meta">
                    <span class="detail-date" id="detailDate">
                        <i class="far fa-calendar"></i>
                        <span></span>
                    </span>
                    <div class="detail-tags" id="detailTags"></div>
                </div>
                <div class="detail-content" id="detailContent"></div>
                <div class="detail-actions">
                    <button class="action-btn like-btn" id="detailLikeBtn">
                        <i class="far fa-heart"></i>
                        <span id="detailLikeCount">0</span>
                        点赞
                    </button>
                    <button class="action-btn share-btn" id="detailShareBtn">
                        <i class="fas fa-share-alt"></i>
                        分享
                    </button>
                </div>
                <div class="detail-admin-actions" id="detailAdminActions" style="display: none;">
                    <button class="action-btn edit-btn" id="detailEditBtn">
                        <i class="fas fa-edit"></i>
                        编辑
                    </button>
                    <button class="action-btn delete-btn" id="detailDeleteBtn">
                        <i class="fas fa-trash"></i>
                        删除
                    </button>
                </div>
                <!-- 本地评论区 -->
                <div class="comments-wrapper" id="commentsWrapper">
                    <h4 class="comments-title">
                        <i class="far fa-comments"></i>
                        评论 <span id="commentCount">0</span>
                    </h4>
                    <div id="commentsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载更多指示器 -->
    <div class="loading-more" id="loadingMore" style="display: none;">
        <div class="loading"></div>
        <span>加载中...</span>
    </div>

    <footer class="footer">
        <div class="container">
            <p>万物皆虚，万物皆允</p>
            <p>登楼撤梯，见月忽指</p>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data-manager.js"></script>
    <script src="js/ideas.js"></script>

    <!-- AOS 动画库 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 800,
                once: true,
                offset: 100,
                easing: 'ease-out-cubic'
            });
        });
    </script>

</body>
</html>
