<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="博客 - 探索技术世界，分享学习心得">
    <title>博客 - 我的个人网站</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/blog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <i class="fas fa-code"></i>
                    <span>我的空间</span>
                </a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="blog.html" class="nav-link active">博客</a></li>
                <li><a href="ideas.html" class="nav-link">奇思妙想</a></li>
                <li><a href="about.html" class="nav-link">关于我</a></li>
            </ul>
            <div class="nav-auth" id="navAuth">
                <button class="auth-btn" id="authBtn">
                    <i class="fas fa-user"></i>
                    <span>登录</span>
                </button>
            </div>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 英雄区域 -->
        <section class="blog-hero">
            <div class="hero-bg">
                <div class="hero-particles"></div>
            </div>
            <div class="container">
                <div class="hero-content" data-aos="fade-up">
                    <h1 class="hero-title">
                        <span class="title-icon"><i class="fas fa-blog"></i></span>
                        技术博客
                    </h1>
                    <p class="hero-subtitle">探索技术世界，分享学习心得</p>
                    <div class="hero-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="articleCount">0</span>
                            <span class="stat-label">篇文章</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="categoryCount">0</span>
                            <span class="stat-label">个分类</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="tagCount">0</span>
                            <span class="stat-label">个标签</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 搜索和筛选 -->
        <section class="blog-filters">
            <div class="container">
                <div class="filter-wrapper">
                    <div class="search-box-large">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索文章标题、内容...">
                        <button class="search-clear" id="searchClear" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="filter-tags" id="filterTags">
                        <button class="filter-tag active" data-category="all">全部</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 文章列表 -->
        <section class="blog-content">
            <div class="container">
                <div class="articles-wrapper">
                    <!-- 侧边栏 -->
                    <aside class="articles-sidebar">
                        <div class="sidebar-card">
                            <h3 class="sidebar-title">
                                <i class="fas fa-folder-tree"></i>
                                文章分类
                            </h3>
                            <ul class="category-tree" id="categoryTree">
                                <!-- 分类将通过JavaScript动态生成 -->
                            </ul>
                        </div>
                        <div class="sidebar-card">
                            <h3 class="sidebar-title">
                                <i class="fas fa-tags"></i>
                                标签云
                            </h3>
                            <div class="tag-cloud" id="tagCloud">
                                <!-- 标签将通过JavaScript动态生成 -->
                            </div>
                        </div>
                        <div class="sidebar-card admin-card" id="adminCard" style="display: none;">
                            <h3 class="sidebar-title">
                                <i class="fas fa-cog"></i>
                                管理
                            </h3>
                            <a href="blog-admin.html" class="admin-btn">
                                <i class="fas fa-plus-circle"></i>
                                写文章
                            </a>
                            <a href="blog-admin.html" class="admin-btn">
                                <i class="fas fa-tasks"></i>
                                管理文章
                            </a>
                        </div>
                    </aside>

                    <!-- 文章列表 -->
                    <div class="articles-main">
                        <div class="articles-list" id="articlesList">
                            <!-- 文章将通过JavaScript从本地存储加载 -->
                        </div>
                        <!-- 加载更多 -->
                        <div class="load-more" id="loadMore" style="display: none;">
                            <button class="load-more-btn" id="loadMoreBtn">
                                <i class="fas fa-sync-alt"></i>
                                加载更多
                            </button>
                        </div>
                        <!-- 空状态 -->
                        <div class="empty-state" id="emptyState" style="display: none;">
                            <div class="empty-icon">
                                <i class="fas fa-feather-alt"></i>
                            </div>
                            <h3>暂无文章</h3>
                            <p>开始你的创作之旅</p>
                            <a href="blog-admin.html" class="btn btn-primary">
                                <i class="fas fa-pen"></i>
                                写第一篇文章
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>万物皆虚，万事皆允</p>
            <p>登楼撤梯，见月忽指</p>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/blog.js"></script>

    <!-- AOS 动画库 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 800,
                once: true,
                offset: 100,
                easing: 'ease-out-cubic'
            });
        });
    </script>
</body>
</html>
